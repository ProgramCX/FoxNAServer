services:
  mongodb:
    image: mongo:7
    container_name: foxnas-mongodb
    restart: unless-stopped
    volumes:
      - ./data/mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 6

  foxnas-standard:
    build:
      context: ../../..
      dockerfile: FoxNAServer/deploy/standard/Dockerfile.standard
    image: programcx/foxnas-standard:latest
    container_name: foxnas-standard
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "80:80"
      - "3306:3306"
      - "6379:6379"
      - "5672:5672"
      - "15672:15672"
    environment:
      TZ: Asia/Shanghai
      MYSQL_DATABASE: ${MYSQL_DATABASE:-db_foxnas}
      MYSQL_USER: ${MYSQL_USER:-foxnas}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-}
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: ${MONGODB_PORT:-27017}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-foxnas_logs}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      APP_SPRING_MAIL_HOST: ${APP_SPRING_MAIL_HOST:-smtp.qq.com}
      APP_SPRING_MAIL_PORT: ${APP_SPRING_MAIL_PORT:-465}
      APP_SPRING_MAIL_FROM: ${APP_SPRING_MAIL_FROM:-}
      APP_SPRING_MAIL_USERNAME: ${APP_SPRING_MAIL_USERNAME:-}
      APP_SPRING_MAIL_PASSWORD: ${APP_SPRING_MAIL_PASSWORD:-}
      APP_SPRING_MAIL_DEFAULT_ENCODING: ${APP_SPRING_MAIL_DEFAULT_ENCODING:-UTF-8}
      APP_SPRING_MAIL_SMTP_AUTH: ${APP_SPRING_MAIL_SMTP_AUTH:-true}
      APP_SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${APP_SPRING_MAIL_SMTP_STARTTLS_ENABLE:-true}
      APP_SPRING_MAIL_SMTP_STARTTLS_REQUIRED: ${APP_SPRING_MAIL_SMTP_STARTTLS_REQUIRED:-true}
      APP_SPRING_MAIL_SMTP_SOCKET_FACTORY_CLASS: ${APP_SPRING_MAIL_SMTP_SOCKET_FACTORY_CLASS:-javax.net.ssl.SSLSocketFactory}
      APP_SPRING_MAIL_SMTP_SOCKET_FACTORY_PORT: ${APP_SPRING_MAIL_SMTP_SOCKET_FACTORY_PORT:-465}
      APP_SPRING_MAIL_SMTP_CONNECTION_TIMEOUT: ${APP_SPRING_MAIL_SMTP_CONNECTION_TIMEOUT:-5000}
      APP_SPRING_MAIL_SMTP_TIMEOUT: ${APP_SPRING_MAIL_SMTP_TIMEOUT:-5000}
      APP_SPRING_MAIL_SMTP_WRITE_TIMEOUT: ${APP_SPRING_MAIL_SMTP_WRITE_TIMEOUT:-5000}
      APP_SPRING_MAIL_SMTP_SOCKET_FACTORY_FALLBACK: ${APP_SPRING_MAIL_SMTP_SOCKET_FACTORY_FALLBACK:-false}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      APP_MULTIPART_MAX_FILE_SIZE: ${APP_MULTIPART_MAX_FILE_SIZE:-10240MB}
      APP_MULTIPART_MAX_REQUEST_SIZE: ${APP_MULTIPART_MAX_REQUEST_SIZE:-10240MB}
      APP_LOG_MAX_FILE_SIZE: ${APP_LOG_MAX_FILE_SIZE:-10MB}
      APP_LOG_MAX_HISTORY: ${APP_LOG_MAX_HISTORY:-30}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      QQ_CLIENT_ID: ${QQ_CLIENT_ID:-}
      QQ_CLIENT_SECRET: ${QQ_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      JWT_SECRET: ${JWT_SECRET:-}
      OAUTH_BASE_URL: ${OAUTH_BASE_URL:-http://localhost:8080}
      OAUTH_FRONTEND_BASE_URL: ${OAUTH_FRONTEND_BASE_URL:-http://localhost:8080}
      APP_SERVER_PORT: ${APP_SERVER_PORT:-8080}
      BROADCAST_PORT: ${BROADCAST_PORT:-25522}
    volumes:
      - ./data/files:/data/files
      - ./data/mysql:/var/lib/mysql
      - ./data/redis:/data/redis
      - ./data/rabbitmq:/var/lib/rabbitmq
      - ./config:/opt/foxnas/config
      - ../../db_foxnas_schema.sql:/opt/foxnas/sql/db_foxnas_schema.sql:ro
      - ./logs:/var/log/foxnas

