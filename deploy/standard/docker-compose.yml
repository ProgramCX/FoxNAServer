services:
  mongodb:
    image: mongo:7
    container_name: foxnas-mongodb
    restart: unless-stopped
    volumes:
      - ./data/mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 6

  foxnas-standard:
    build:
      context: ../../..
      dockerfile: FoxNAServer/deploy/standard/Dockerfile.standard
    image: programcx/foxnas-standard:latest
    container_name: foxnas-standard
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "80:80"
      - "3306:3306"
      - "6379:6379"
      - "5672:5672"
      - "15672:15672"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data/files:/data/files
      - ./data/mysql:/var/lib/mysql
      - ./data/redis:/data/redis
      - ./data/rabbitmq:/var/lib/rabbitmq
      - type: bind
        source: ${FOXNAS_CONFIG_FILE:?请设置 FOXNAS_CONFIG_FILE 为本地 config.properties 路径}
        target: /opt/foxnas/config.properties
        read_only: true
      - ../../db_foxnas_schema.sql:/opt/foxnas/sql/db_foxnas_schema.sql:ro
      - ./logs:/var/log/foxnas

