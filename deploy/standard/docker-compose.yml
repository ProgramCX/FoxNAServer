services:
  foxnas-standard:
    build:
      context: ../../..
      dockerfile: FoxNAServer/deploy/standard/Dockerfile.standard
    image: foxnas/standard:latest
    container_name: foxnas-standard
    restart: unless-stopped
    ports:
      - "80:80"
      - "3306:3306"
      - "6379:6379"
      - "5672:5672"
      - "15672:15672"
    environment:
      TZ: Asia/Shanghai
      MYSQL_DATABASE: db_foxnas
      MYSQL_USER: foxnas
      MYSQL_PASSWORD: foxnas
      MYSQL_ROOT_PASSWORD: root123456
      JWT_SECRET: foxnas-default-change-me
      OAUTH_BASE_URL: http://localhost
      OAUTH_FRONTEND_BASE_URL: http://localhost
      APP_SERVER_PORT: 8848
      BROADCAST_PORT: 25522
    volumes:
      - ./data/files:/data/files
      - ./data/mysql:/var/lib/mysql
      - ./data/redis:/data/redis
      - ./data/rabbitmq:/var/lib/rabbitmq
      - ./config:/opt/foxnas/config
      - ./logs:/var/log/foxnas

