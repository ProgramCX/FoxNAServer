services:
  mongodb:
    image: mongo:7
    container_name: foxnas-mongodb
    restart: unless-stopped
    volumes:
      - ./data/mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 6

  foxnas-allinone:
    build:
      context: ../../..
      dockerfile: FoxNAServer/deploy/all-in-one/Dockerfile.allinone
    image: programcx/foxnas-allinone:latest
    container_name: foxnas-allinone
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data/files:/data/files
      - ./data/mysql:/var/lib/mysql
      - ./data/redis:/data/redis
      - ./data/rabbitmq:/var/lib/rabbitmq
      - type: bind
        source: ${FOXNAS_CONFIG_FILE:-../../config.properties}
        target: /opt/foxnas/config.properties
        read_only: true
      - ../../db_foxnas_schema.sql:/opt/foxnas/sql/db_foxnas_schema.sql:ro
      - ./logs:/var/log/foxnas
